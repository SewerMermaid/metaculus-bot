name: Forecast on new AI tournament questions

on:
  workflow_dispatch:
  schedule:
    # Split across multiple cron entries to avoid GitHub Actions silently dropping
    # */N schedules under runner load. Off-the-hour offsets dodge the :00 burst.
    # Make sure to skip already forecasted questions!
    - cron: "3 * * * *"  # every hour at :03
    - cron: "23 * * * *" # every hour at :23
    - cron: "43 * * * *" # every hour at :43

# Add concurrency group to prevent parallel runs
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false


# Daily job to run the simple forecast bot
jobs:
  forecast_job:
    runs-on: ubuntu-latest # determines the machine that will run the job - keep as is
    steps: # sets up the steps that will be run in order
      # setup repository with all necessary dependencies - keep as is
      - name: Check out repository
        uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        id: setup-python
        with:
          python-version: "3.11"
      - name: Install poetry
        uses: snok/install-poetry@v1
        continue-on-error: true
        with:
          version: 2.2.1
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true
      - name: Ensure Poetry is available (fallback install)
        run: |
          poetry --version || (
            python -m pip install -U pip &&
            for i in 1 2 3; do
              python -m pip install "poetry==2.2.1" && break || sleep 10;
            done &&
            poetry --version
          )
      # Use the lockfile env. To update deps, run `poetry lock` to update lockfile, then `poetry install` to install the lockfile pkgs, and finally push to Github.
      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/poetry.lock') }}
      - name: Install dependencies
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          retry_on: error
          timeout_minutes: 10
          command: poetry install --no-interaction --no-root
        env:
          POETRY_VIRTUALENVS_CREATE: true
          POETRY_VIRTUALENVS_IN_PROJECT: true
          POETRY_INSTALLER_PARALLEL: true
      - name: Run bot
        run: |
          poetry run python main.py
        # this reads the environment variables from the github repository.
        # Store under Settings --> Secrets and variables --> Actions
        env:
          METACULUS_TOKEN: ${{ secrets.METACULUS_TOKEN }} # replace this with the name of the variable under which you stored your own Metaculus token
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OAI_ANTH_OPENROUTER_KEY: ${{ secrets.OAI_ANTH_OPENROUTER_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ASKNEWS_CLIENT_ID: ${{ secrets.ASKNEWS_CLIENT_ID }}
          ASKNEWS_SECRET: ${{ secrets.ASKNEWS_SECRET }}
          ASKNEWS_MAX_CONCURRENCY: '1'
          ASKNEWS_MAX_RPS: '0.2'
          # Native search runs in parallel with AskNews; model defaults to
          # openai/gpt-5.5 (medium effort, verbosity=low, 360s) per constants.py.
          NATIVE_SEARCH_ENABLED: 'true'
          FINANCIAL_DATA_ENABLED: 'true'
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          # Gemini grounded search (Google AI Studio SDK) adds a 3rd distinct source.
          # GOOGLE_API_KEY is the operator's personal Google AI Studio key (stored
          # in CI as secrets.GEMINI_API_KEY). The grounded-search side has no
          # donated/shared path — Google AI Studio doesn't offer one.
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_SEARCH_ENABLED: 'true'
          # OpenRouter Gemini routing (forecaster, stacker, summarizer when the
          # ensemble includes a Google model). When 'false' (default), Gemini
          # OpenRouter calls flow through OPENROUTER_API_KEY only — bypassing
          # the Metaculus-donated OAI_ANTH_OPENROUTER_KEY wrapper. Off because
          # the donated-key Google route has been flaky.
          GEMINI_USE_DONATED_OPENROUTER_KEY: 'true'
          # Second-pass gap-fill: analyzer identifies gaps in first-pass research,
          # parallel grounded Gemini searches resolve each. Fails soft.
          GAP_FILL_ENABLED: 'true'
          # Probabilistic tools post-processor: deterministic probability math
          # injected into per-forecaster rationales and the stacker's view.
          # Per-type allow-list: empirically helpful for binary (Wilcoxon p=0.094,
          # n=44) and MC (directional, n=22); inconclusive for numeric (n=22,
          # p=0.113), so excluded.
          PROBABILISTIC_TOOLS_ENABLED: 'true'
          PROBABILISTIC_TOOLS_TYPES: 'binary,multiple_choice'
          # Prediction-market snapshot provider: queries Polymarket, Kalshi,
          # Manifold concurrently and aggregates into research blurb. Hard-
          # disabled under is_benchmarking=True to prevent backtest leakage
          # (the prod path is_benchmarking=False, so this fires here).
          PREDICTION_MARKETS_ENABLED: 'true'
          # Disable stacking on all types. n=88 ablation: stacker hurts numeric CRPS
          # and is <= median on binary; 2026-05-29 peer recompute found the stacker's
          # own model (claude-opus-4.5) is one of the weakest base binary forecasters.
          NUMERIC_STACKING_ENABLED: 'false'
          BINARY_STACKING_ENABLED: 'false'
          MC_STACKING_ENABLED: 'false'
          # Suppress openai-agents trace-export background thread (unused).
          OPENAI_AGENTS_DISABLE_TRACING: 'true'
          # Persist research outputs as JSONL for offline backtest replay.
          PERSIST_RESEARCH_ENABLED: 'true'
      - name: Upload research outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: research-${{ github.run_id }}
          path: research_outputs/
          retention-days: 180
          if-no-files-found: ignore
